<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="GAL Visits">
<title>GAL Visit Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100%;background:#F7F5F0;font-family:Georgia,serif;color:#2A2620;-webkit-text-size-adjust:100%}
input,select,textarea{-webkit-appearance:none;appearance:none;font-family:Georgia,serif;font-size:14px;box-sizing:border-box}
button{cursor:pointer;font-family:'Trebuchet MS',sans-serif}
:root{--bg:#F7F5F0;--card:#fff;--navy:#1B2E4B;--teal:#2A7D6B;--accent:#C4822A;--border:#DDD8CF;--muted:#8A8279;--text:#2A2620;--danger:#B33A3A;--success:#2A7D4F;--ibg:#FAFAF8}
#app{min-height:100vh;width:100%;background:var(--bg)}
#hdr{background:var(--navy);padding:12px 16px;position:sticky;top:0;z-index:99;box-shadow:0 2px 12px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:space-between}
#hdr .sub{font-size:9px;color:#8BA4CC;letter-spacing:1.6px;text-transform:uppercase;font-family:'Trebuchet MS',sans-serif}
#hdr .ttl{font-size:18px;font-weight:700;color:#EDF3FF}
#hdr-btns{display:flex;gap:8px;align-items:center}
.btn{padding:9px 16px;border-radius:9px;border:none;font-size:12px;font-weight:700;color:#fff;font-family:'Trebuchet MS',sans-serif;letter-spacing:.4px}
.btn-teal{background:var(--teal)}
.btn-navy{background:var(--navy)}
.btn-accent{background:var(--accent)}
.btn-success{background:var(--success)}
.btn-danger{background:var(--danger)}
.btn-outline{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);color:#fff}
#tab-bar{overflow-x:auto;background:var(--card);border-bottom:1px solid var(--border);padding:6px 10px;display:flex;gap:4px;-webkit-overflow-scrolling:touch;white-space:nowrap}
.tab{padding:7px 12px;border:none;background:transparent;color:var(--muted);border-radius:7px;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;font-family:'Trebuchet MS',sans-serif;white-space:nowrap}
.tab.on{background:var(--navy);color:#fff}
#main{padding:12px 16px}
.sec{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.sec-ttl{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;gap:6px;font-family:'Trebuchet MS',sans-serif;border-bottom:2px solid var(--teal);padding-bottom:6px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px}
.r1{margin-bottom:11px}
.lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;display:block;font-family:'Trebuchet MS',sans-serif}
input[type=text],input[type=date],input[type=time],select,textarea{width:100%;padding:9px 11px;border-radius:8px;border:1.5px solid var(--border);background:var(--ibg);color:var(--text);font-size:13px;outline:none}
textarea{resize:vertical;line-height:1.6}
.tog-wrap{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;margin-bottom:10px}
.tog-track{width:42px;height:24px;border-radius:12px;background:var(--border);position:relative;transition:background .2s;flex-shrink:0}
.tog-track.on{background:var(--teal)}
.tog-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:9px;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog-track.on .tog-thumb{left:21px}
.tog-lbl{font-size:13px;color:var(--text)}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.chip{padding:4px 9px;border-radius:20px;border:1.5px solid var(--border);background:var(--ibg);color:var(--muted);font-size:11px;font-weight:500;font-family:'Trebuchet MS',sans-serif}
.chip.on{border-color:var(--teal);background:rgba(42,125,107,.1);color:var(--teal);font-weight:700}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center}
.stat-ico{font-size:18px;margin-bottom:2px}
.stat-val{font-size:18px;font-weight:700;color:var(--navy)}
.stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-family:'Trebuchet MS',sans-serif}
.vi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 13px;display:flex;align-items:center;gap:12px;border-left:3px solid var(--teal);box-shadow:0 1px 3px rgba(0,0,0,.04);margin-bottom:10px}
.vi-body{flex:1;min-width:0;cursor:pointer}
.vi-name{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:2px}
.vi-sub{font-size:12px;color:var(--muted);font-family:'Trebuchet MS',sans-serif}
.vi-type{font-size:11px;color:var(--teal);font-weight:600;margin-top:2px;font-family:'Trebuchet MS',sans-serif;text-transform:uppercase;letter-spacing:.5px}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-ico{font-size:48px;margin-bottom:12px}
.empty-ttl{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:6px}
.save-bar{display:flex;justify-content:flex-end;align-items:center;gap:10px;margin-top:8px;padding-bottom:20px}
.save-msg{font-size:12px;font-weight:700;font-family:'Trebuchet MS',sans-serif}
.med-blk{background:var(--bg);border-radius:10px;border:1px solid var(--border);padding:12px 14px;margin-bottom:10px}
.wishes-box{border-radius:12px;padding:14px 16px;margin-bottom:14px;border-width:2px;border-style:solid}
.wishes-ttl{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;font-family:'Trebuchet MS',sans-serif;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;color:#fff}
.wishes-chk{display:flex;align-items:flex-start;gap:12px;border-radius:10px;padding:12px 14px;margin-bottom:12px;border:1.5px solid;cursor:pointer}
.wishes-chk input{width:20px;height:20px;margin-top:2px;flex-shrink:0;accent-color:var(--teal)}
.wishes-chk span{font-size:13px;font-weight:600;line-height:1.5;font-family:Georgia,serif}
#narr-ta{width:100%;padding:10px;border-radius:8px;border:1.5px solid var(--border);background:var(--ibg);font-family:'Courier New',monospace;font-size:12px;line-height:1.6;min-height:380px;resize:vertical;color:var(--text)}
.srch-wrap{position:relative;margin-bottom:12px}
.srch-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
#srch{padding-left:36px}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div id="hdr-left"><div class="sub">Guardian Ad Litem</div><div class="ttl" id="hdr-ttl">Visit Records</div></div>
    <div id="hdr-btns"></div>
  </div>
  <div id="view-list" style="display:none"></div>
  <div id="view-form" style="display:none">
    <div id="tab-bar"></div>
    <div id="main"></div>
  </div>
</div>
<script>
// ── Storage ───────────────────────────────────────────────────────────────────
const SK='gal_visits_v5';
function lsRead(){try{const r=localStorage.getItem(SK);return r?JSON.parse(r):[]}catch(e){return[]}}
function lsWrite(v){try{localStorage.setItem(SK,JSON.stringify(v));return true}catch(e){return false}}

// ── Data ──────────────────────────────────────────────────────────────────────
const PLACEMENTS=["Foster Home","Relative","Non-Relative","Group Home","Reunified"];
const VISIT_TYPES=["Scheduled","Unannounced","Initial","Follow-Up"];
const ACADEMIC=["On Grade Level","Below Grade Level","Above Grade Level","Unknown","Not Applicable"];
const QUAL=["Good","Fair","Poor","N/A"];
const VSTATUS=["Active","Suspended","Terminated","N/A"];
const FREQS=["Once Daily","Twice Daily","Three Times Daily","As Needed","Weekly","Other"];
const TABS=[{id:'core',label:'📋 Visit'},{id:'medical',label:'🏥 Medical'},{id:'obs',label:'👁 Observe'},{id:'education',label:'🎓 School'},{id:'visitation',label:'👨‍👩‍👧 Visits'},{id:'gal',label:'⚖️ GAL'},{id:'narrative',label:'📄 Report'}];
const OBS_TERMS={
  behavior:["Cooperative","Compliant","Defiant","Oppositional","Impulsive","Hyperactive","Aggressive","Withdrawn","Age-appropriate","Self-regulated"],
  mood:["Euthymic","Anxious","Depressed","Irritable","Elevated","Labile","Flat affect","Constricted affect","Cheerful","Dysthymic"],
  interaction:["Warm and responsive","Appropriate boundaries","Seeks reassurance","Avoidant attachment","Secure attachment","Parentified","Peer-appropriate","Deferential to caregiver","Resistant to engagement","Spontaneous and playful"],
  communication:["Articulate","Age-appropriate","Delayed expressive language","Selective mutism","Open and forthcoming","Guarded","Tangential","Concrete thinking","Non-verbal cues present","Responsive to questions"],
  appearance:["Clean and well-groomed","Appropriately dressed","Signs of neglect","Adequate hygiene","Poor dentition","Healthy weight","Underweight","Overweight","No visible injuries","Visible bruising or marks"],
  concerns:["Unexplained injuries","Regression in development","Signs of trauma","Food insecurity","Lack of supervision","Exposure to domestic violence","Substance use in home","Inconsistent school attendance","Medical neglect","Emotional unavailability of caregiver"],
  strengths:["Strong caregiver bond","Resilient","Engaged in school","Positive peer relationships","Expresses emotions appropriately","Participating in therapy","Demonstrates empathy","Self-advocacy skills","Supportive extended family","Motivated and goal-oriented"],
  sleepingArea:["Private sleeping space","Shared room — appropriate","Clean and safe","Adequate bedding","Age-appropriate","No privacy concerns","Cluttered or unsafe","Lacks appropriate bedding","Smoke or odor present","Accessible to caregiver"],
  homeObs:["Clean and organized","Adequate food supply","Utilities functioning","Safe and hazard-free","Evidence of substance use","Overcrowded","Pet waste present","Broken fixtures","Child-proofed appropriately","Warm and nurturing atmosphere"],
  caregiver:["Engaged and responsive","Reports no concerns","Requesting additional support","Demonstrates appropriate parenting","Expresses frustration","Financial stressors reported","Cooperative with case plan","Respite care needed","Unaware of child's therapeutic needs","Strong commitment to child's well-being"],
  wishes:["Wants to return home","Wants to stay in current placement","Desires more sibling contact","Wants more parent visits","Expressed desire for adoption","Wants to remain with caregiver","Interested in extracurriculars","Expressed safety concerns","Wants help in school","Desires stability and permanency"]
};

function newVisit(){
  const now=new Date();
  return{id:Date.now().toString(36)+Math.random().toString(36).slice(2),date:now.toISOString().split('T')[0],time:now.toTimeString().slice(0,5),childName:'',caseNumber:'',placementType:'Foster Home',visitType:'Scheduled',visitAddress:'',peoplePresent:'',lastMedDate:'',lastMedProvider:'',nextMedDate:'',nextMedProvider:'',lastDentDate:'',lastDentProvider:'',nextDentDate:'',nextDentProvider:'',visionNeeds:'',hasPsychMed:false,medications:[],nextMedMgmtDate:'',nextMedMgmtProvider:'',behavior:'',mood:'',interaction:'',communication:'',appearance:'',concerns:'',strengths:'',childStatements:'',sleepingArea:'',homeObs:'',caregiver:'',schoolName:'',gradeLevel:'',academicProgress:'On Grade Level',hasIEP:false,hasPlan504:false,servicesReceiving:'',addlNeeds:'',wishes:'',wishesConfirmed:false,parentStatus:'Active',parentFreq:'',parentQuality:'Good',parentConcerns:'',siblingStatus:'Active',siblingNotes:'',galFollowUp:'',additionalNotes:'',narrative:''};
}

// ── State ─────────────────────────────────────────────────────────────────────
let visits=lsRead();
let view='list';
let cur=null;
let tab='core';
let search='';

// ── Helpers ───────────────────────────────────────────────────────────────────
const fmtDate=d=>{if(!d)return'N/A';const[y,m,day]=d.split('-');return`${m}/${day}/${y}`};
const fmtTime=t=>{if(!t)return'';const[h,m]=t.split(':');const hr=+h;return`${hr%12||12}:${m} ${hr>=12?'PM':'AM'}`};
function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;return e}
function inp(type,val,key,ph){const i=document.createElement('input');i.type=type;i.value=val||'';if(ph)i.placeholder=ph;i.addEventListener('input',e=>{cur[key]=e.target.value});return i}
function ta(val,key,ph,rows){const t=document.createElement('textarea');t.value=val||'';t.rows=rows||2;if(ph)t.placeholder=ph;t.addEventListener('input',e=>{cur[key]=e.target.value});return t}
function sel(opts,val,key){const s=document.createElement('select');opts.forEach(o=>{const op=document.createElement('option');op.value=o;op.textContent=o;if(o===val)op.selected=true;s.appendChild(op)});s.addEventListener('change',e=>{cur[key]=e.target.value});return s}
function fld(label,child){const w=el('div','r1');const l=el('label','lbl',label);w.appendChild(l);w.appendChild(child);return w}
function r2(...fields){const r=el('div','r2');fields.forEach(f=>r.appendChild(f));return r}
function tog(label,val,key){
  const w=el('div','tog-wrap');
  const tr=el('div','tog-track'+(val?' on':''));
  tr.appendChild(el('div','tog-thumb'));
  const lb=el('span','tog-lbl',label);
  tr.addEventListener('click',()=>{cur[key]=!cur[key];tr.classList.toggle('on',cur[key])});
  w.appendChild(tr);w.appendChild(lb);return w;
}
function chips(field,val,key){
  const terms=OBS_TERMS[field]||[];
  const wrap=el('div','chips');
  terms.forEach(t=>{
    const on=val&&val.toLowerCase().includes(t.toLowerCase());
    const c=el('button','chip'+(on?' on':''),on?'✓ '+t:t);
    c.addEventListener('click',()=>{
      if(cur[key]&&cur[key].toLowerCase().includes(t.toLowerCase()))return;
      cur[key]=cur[key]?cur[key]+', '+t:t;
      render();
    });
    wrap.appendChild(c);
  });
  return wrap;
}
function obsField(label,field,key){
  const w=el('div','r1');
  w.appendChild(el('label','lbl',label));
  w.appendChild(chips(field,cur[key],key));
  w.appendChild(ta(cur[key],key,'Tap terms above or type notes...'));
  return w;
}

// ── Narrative ─────────────────────────────────────────────────────────────────
function buildNarrative(v){
  const name=v.childName||'[Child Name]';
  const dash='─'.repeat(55);
  const parts=[];
  parts.push(`GUARDIAN AD LITEM VISIT REPORT\nCase Number: ${v.caseNumber||'[Case #]'}\n${dash}`);
  const intro=[`On ${fmtDate(v.date)}${v.time?` at ${fmtTime(v.time)}`:''}, the Guardian Ad Litem conducted a ${v.visitType.toLowerCase()} visit with ${name}${v.visitAddress?` at ${v.visitAddress}`:''}. `,v.placementType?`At the time of this visit, ${name} was residing in a ${v.placementType.toLowerCase()} placement. `:'',v.peoplePresent?`The following individuals were present: ${v.peoplePresent}.`:''].filter(Boolean).join('');
  parts.push(`VISIT OVERVIEW\n\n${intro}`);
  const med=[];
  if(v.lastMedDate||v.lastMedProvider)med.push(`${name}'s most recent medical appointment was on ${fmtDate(v.lastMedDate)}${v.lastMedProvider?` with ${v.lastMedProvider}`:''}. `);
  if(v.nextMedDate||v.nextMedProvider)med.push(`A follow-up medical appointment is scheduled for ${fmtDate(v.nextMedDate)}${v.nextMedProvider?` with ${v.nextMedProvider}`:''}. `);
  if(v.lastDentDate||v.lastDentProvider)med.push(`${name}'s last dental appointment was on ${fmtDate(v.lastDentDate)}${v.lastDentProvider?` with ${v.lastDentProvider}`:''}. `);
  if(v.nextDentDate||v.nextDentProvider)med.push(`The next dental appointment is scheduled for ${fmtDate(v.nextDentDate)}${v.nextDentProvider?` with ${v.nextDentProvider}`:''}. `);
  if(v.visionNeeds)med.push(`Vision needs: ${v.visionNeeds}. `);
  if(v.hasPsychMed&&v.medications.length>0){const ml=v.medications.map(m=>`${m.name||'unspecified'} (${m.dosage?m.dosage+' mg, ':''}${m.frequency.toLowerCase()})${m.reason?` for ${m.reason}`:''}`);med.push(`${name} is currently prescribed: ${ml.join('; ')}. `);if(v.nextMedMgmtDate||v.nextMedMgmtProvider)med.push(`Next medication management appointment: ${fmtDate(v.nextMedMgmtDate)}${v.nextMedMgmtProvider?` with ${v.nextMedMgmtProvider}`:''}. `);}
  else med.push(`No psychotropic medications reported for ${name} at this time. `);
  if(med.length)parts.push(`HEALTH AND MEDICAL INFORMATION\n\n${med.join('')}`);
  const obs=[];
  if(v.behavior||v.mood)obs.push(`During the visit, ${name} presented with ${[v.behavior,v.mood].filter(Boolean).join(' and ').toLowerCase()}. `);
  if(v.appearance)obs.push(`In terms of physical appearance, ${name} appeared ${v.appearance}. `);
  if(v.interaction)obs.push(`${name}'s interaction with others: ${v.interaction}. `);
  if(v.communication)obs.push(`Communication was observed to be ${v.communication.toLowerCase()}. `);
  if(v.strengths)obs.push(`Strengths observed: ${v.strengths}. `);
  if(v.concerns)obs.push(`Concerns noted: ${v.concerns}. `);
  if(v.childStatements)obs.push(`\n${name} stated: "${v.childStatements}"`);
  if(obs.length)parts.push(`CHILD OBSERVATION\n\n${obs.join('')}`);
  const env=[];
  if(v.sleepingArea)env.push(`Sleeping Area: ${v.sleepingArea}`);
  if(v.homeObs)env.push(`Home Environment: ${v.homeObs}`);
  if(env.length)parts.push(`HOME ENVIRONMENT OBSERVATION\n\n${env.join('\n\n')}`);
  if(v.caregiver)parts.push(`CAREGIVER CONVERSATION\n\nThe Guardian Ad Litem conducted a private conversation with the caregiver. The following was noted: ${v.caregiver}`);
  if(v.wishesConfirmed||v.wishes){const wi=v.wishesConfirmed?`The Guardian Ad Litem directly asked ${name} about their wishes and wants during this visit. `:`The following wishes and wants were noted. `;parts.push(`CHILD'S EXPRESSED WISHES AND WANTS\n\n${wi}${v.wishes?`${name} expressed: ${v.wishes}`:''}`);}
  const edu=[];
  if(v.schoolName)edu.push(`${name} is currently enrolled at ${v.schoolName}${v.gradeLevel?`, ${v.gradeLevel}`:''}. `);
  if(v.academicProgress)edu.push(`Academic progress: ${v.academicProgress.toLowerCase()}. `);
  const plans=[v.hasIEP&&'an IEP',v.hasPlan504&&'a 504 Plan'].filter(Boolean);
  if(plans.length)edu.push(`${name} has ${plans.join(' and ')} in place. `);
  if(v.servicesReceiving)edu.push(`Services receiving: ${v.servicesReceiving}. `);
  if(v.addlNeeds)edu.push(`Additional needs: ${v.addlNeeds}. `);
  if(edu.length)parts.push(`EDUCATION\n\n${edu.join('')}`);
  const vis=[];
  if(v.parentStatus)vis.push(`Parent visitation is currently ${v.parentStatus.toLowerCase()}. `);
  if(v.parentFreq)vis.push(`Visits are occurring ${v.parentFreq.toLowerCase()}. `);
  if(v.parentQuality&&v.parentQuality!=='N/A')vis.push(`Quality of parent visitation: ${v.parentQuality.toLowerCase()}. `);
  if(v.parentConcerns)vis.push(`Parent visit concerns: ${v.parentConcerns}. `);
  if(v.siblingStatus&&v.siblingStatus!=='N/A')vis.push(`Sibling visitation status: ${v.siblingStatus.toLowerCase()}. `);
  if(v.siblingNotes)vis.push(`${v.siblingNotes}. `);
  if(vis.length)parts.push(`VISITATION\n\n${vis.join('')}`);
  if(v.galFollowUp)parts.push(`GAL FOLLOW-UP NEEDED\n\nThe following action items are required: ${v.galFollowUp}`);
  if(v.additionalNotes)parts.push(`ADDITIONAL NOTES\n\n${v.additionalNotes}`);
  parts.push(`${dash}\nReport prepared by Guardian Ad Litem Volunteer, Walter F. Edwards\nDate of Report: ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}`);
  return parts.join('\n\n');
}

// ── Save ──────────────────────────────────────────────────────────────────────
function saveVisit(){
  const idx=visits.findIndex(v=>v.id===cur.id);
  if(idx>=0)visits[idx]={...cur};
  else visits.unshift({...cur});
  const ok=lsWrite(visits);
  return ok;
}

// ── Render Header ─────────────────────────────────────────────────────────────
function renderHeader(){
  document.getElementById('hdr-ttl').textContent=view==='list'?'Visit Records':cur?.childName||'New Visit';
  const btns=document.getElementById('hdr-btns');
  btns.innerHTML='';
  if(view==='form'){
    const back=el('button','btn btn-outline','← Back');
    back.addEventListener('click',()=>{view='list';render()});
    btns.appendChild(back);
  } else {
    const nb=el('button','btn btn-teal','+ New Visit');
    nb.addEventListener('click',()=>{cur=newVisit();tab='core';view='form';render()});
    btns.appendChild(nb);
  }
}

// ── Render List ───────────────────────────────────────────────────────────────
function renderList(){
  const vl=document.getElementById('view-list');
  vl.innerHTML='';
  const wrap=el('div');
  wrap.style.padding='12px 16px';
  // Stats
  const now=new Date();
  const st=el('div','stats');
  const thisMonth=visits.filter(v=>{const d=new Date(v.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()}).length;
  const cases=new Set(visits.map(v=>v.caseNumber).filter(Boolean)).size;
  [{ico:'📋',val:visits.length,lbl:'Total'},{ico:'👦',val:cases,lbl:'Cases'},{ico:'📅',val:thisMonth,lbl:'This Month'}].forEach(s=>{
    const c=el('div','stat');
    c.innerHTML=`<div class="stat-ico">${s.ico}</div><div class="stat-val">${s.val}</div><div class="stat-lbl">${s.lbl}</div>`;
    st.appendChild(c);
  });
  wrap.appendChild(st);
  // Search
  const sw=el('div','srch-wrap');
  const sico=el('span','srch-ico','🔍');
  const si=el('input');si.type='text';si.id='srch';si.placeholder='Search by name or case number...';si.value=search;
  si.addEventListener('input',e=>{search=e.target.value;renderList()});
  sw.appendChild(sico);sw.appendChild(si);wrap.appendChild(sw);
  // List
  const filtered=visits.filter(v=>!search||v.childName.toLowerCase().includes(search.toLowerCase())||v.caseNumber.toLowerCase().includes(search.toLowerCase()));
  if(filtered.length===0){
    const em=el('div','empty');
    em.innerHTML=`<div class="empty-ico">${visits.length===0?'📋':'🔍'}</div><div class="empty-ttl">${visits.length===0?'No visits recorded yet':'No matching records'}</div><div>${visits.length===0?"Tap '+ New Visit' to begin.":'Try a different search.'}</div>`;
    wrap.appendChild(em);
  } else {
    filtered.forEach(v=>{
      const item=el('div','vi');
      const body=el('div','vi-body');
      body.innerHTML=`<div class="vi-name">${v.childName||'Unnamed Child'}</div><div class="vi-sub">Case #${v.caseNumber||'N/A'} · ${fmtDate(v.date)} ${fmtTime(v.time)}</div><div class="vi-type">${v.placementType} · ${v.visitType}</div>`;
      body.addEventListener('click',()=>{cur={...v};tab='core';view='form';render()});
      // Delete btn
      const db=el('button','','🗑');
      db.style.cssText='background:none;border:none;color:var(--muted);font-size:20px;padding:4px 8px;line-height:1;cursor:pointer';
      let conf=false;
      db.addEventListener('click',()=>{
        if(!conf){conf=true;db.textContent='Delete?';db.style.color='var(--danger)';db.style.fontSize='11px';db.style.fontWeight='700';setTimeout(()=>{conf=false;db.textContent='🗑';db.style.color='var(--muted)';db.style.fontSize='20px';db.style.fontWeight=''},3000);}
        else{visits=visits.filter(x=>x.id!==v.id);lsWrite(visits);renderList();}
      });
      item.appendChild(body);item.appendChild(db);wrap.appendChild(item);
    });
  }
  vl.appendChild(wrap);
}

// ── Tab Panels ────────────────────────────────────────────────────────────────
function tabCore(){
  const s=el('div','sec');
  s.appendChild(el('div','sec-ttl','📋 Visit Details'));
  s.appendChild(r2(fld('Date of Visit',inp('date',cur.date,'date')),fld('Time of Visit',inp('time',cur.time,'time'))));
  s.appendChild(r2(fld('Child Name',inp('text',cur.childName,'childName','First Last')),fld('Case Number',inp('text',cur.caseNumber,'caseNumber','2024-JV-00123'))));
  s.appendChild(r2(fld('Placement Type',sel(PLACEMENTS,cur.placementType,'placementType')),fld('Type of Visit',sel(VISIT_TYPES,cur.visitType,'visitType'))));
  s.appendChild(fld('Address of Visit',inp('text',cur.visitAddress,'visitAddress','Street address of visit')));
  s.appendChild(fld('People Present',ta(cur.peoplePresent,'peoplePresent','Names and relationship to child...')));
  return s;
}

function tabMedical(){
  const f=document.createDocumentFragment();
  const s1=el('div','sec');s1.appendChild(el('div','sec-ttl','🩺 Medical Appointments'));
  s1.appendChild(r2(fld('Last Medical Appt',inp('date',cur.lastMedDate,'lastMedDate')),fld('Provider',inp('text',cur.lastMedProvider,'lastMedProvider','Dr. Smith'))));
  s1.appendChild(r2(fld('Next Medical Appt',inp('date',cur.nextMedDate,'nextMedDate')),fld('Provider',inp('text',cur.nextMedProvider,'nextMedProvider','Dr. Smith'))));
  f.appendChild(s1);
  const s2=el('div','sec');s2.appendChild(el('div','sec-ttl','🦷 Dental Appointments'));
  s2.appendChild(r2(fld('Last Dental Appt',inp('date',cur.lastDentDate,'lastDentDate')),fld('Provider',inp('text',cur.lastDentProvider,'lastDentProvider','Dr. Jones'))));
  s2.appendChild(r2(fld('Next Dental Appt',inp('date',cur.nextDentDate,'nextDentDate')),fld('Provider',inp('text',cur.nextDentProvider,'nextDentProvider','Dr. Jones'))));
  f.appendChild(s2);
  const s3=el('div','sec');s3.appendChild(el('div','sec-ttl','💊 Vision & Medications'));
  s3.appendChild(fld('Vision Needs',inp('text',cur.visionNeeds,'visionNeeds','Glasses, contacts, none...')));
  s3.appendChild(tog('Child prescribed psychotropic medication',cur.hasPsychMed,'hasPsychMed'));
  if(cur.hasPsychMed){
    cur.medications.forEach((m,i)=>{
      const mb=el('div','med-blk');
      const mh=el('div');mh.style.cssText='display:flex;justify-content:space-between;margin-bottom:8px';
      const mt=el('span','','Medication '+(i+1));mt.style.cssText='font-size:11px;font-weight:700;color:var(--navy);font-family:Trebuchet MS,sans-serif;text-transform:uppercase';
      const rm=el('button','','×');rm.style.cssText='background:none;border:none;color:var(--danger);font-size:20px;cursor:pointer;line-height:1';
      rm.addEventListener('click',()=>{cur.medications.splice(i,1);render()});
      mh.appendChild(mt);mh.appendChild(rm);mb.appendChild(mh);
      const ni=inp('text',m.name,'_','Risperidone');ni.addEventListener('input',e=>cur.medications[i].name=e.target.value);
      const di=inp('text',m.dosage,'_','0.5');di.addEventListener('input',e=>cur.medications[i].dosage=e.target.value);
      mb.appendChild(r2(fld('Name',ni),fld('Dosage (mg)',di)));
      const fi=sel(FREQS,m.frequency,'_');fi.addEventListener('change',e=>cur.medications[i].frequency=e.target.value);
      const ri=inp('text',m.reason,'_','ADHD, anxiety');ri.addEventListener('input',e=>cur.medications[i].reason=e.target.value);
      mb.appendChild(r2(fld('Frequency',fi),fld('Reason',ri)));
      s3.appendChild(mb);
    });
    const ab=el('button','btn btn-teal','+ Add Medication');ab.style.cssText='width:100%;margin-bottom:10px';
    ab.addEventListener('click',()=>{cur.medications.push({name:'',dosage:'',frequency:'Once Daily',reason:''});render()});
    s3.appendChild(ab);
    s3.appendChild(r2(fld('Next Med Mgmt Appt',inp('date',cur.nextMedMgmtDate,'nextMedMgmtDate')),fld('Provider',inp('text',cur.nextMedMgmtProvider,'nextMedMgmtProvider','Dr. Patel'))));
  }
  f.appendChild(s3);return f;
}

function tabObs(){
  const f=document.createDocumentFragment();
  const s1=el('div','sec');s1.appendChild(el('div','sec-ttl','🔍 Child Observation'));
  const hint=el('p','','Tap a term to add it, or type freely below each field.');hint.style.cssText='font-size:11px;color:var(--muted);margin-bottom:12px;font-family:Trebuchet MS,sans-serif';
  s1.appendChild(hint);
  [['behavior','Behavior'],['mood','Mood'],['interaction','Interaction with Others'],['communication','Communication'],['appearance','Physical Appearance'],['concerns','Concerns Observed'],['strengths','Strengths Observed']].forEach(([k,l])=>s1.appendChild(obsField(l,k,k)));
  s1.appendChild(fld('Statements Made by Child',ta(cur.childStatements,'childStatements','Direct quotes or paraphrased statements...',3)));
  f.appendChild(s1);
  const s2=el('div','sec');s2.appendChild(el('div','sec-ttl','🛏 Sleeping Area'));s2.appendChild(obsField('Sleeping Area Observations','sleepingArea','sleepingArea'));f.appendChild(s2);
  const s3=el('div','sec');s3.appendChild(el('div','sec-ttl','🏠 Home Environment'));s3.appendChild(obsField('Home Environment Observations','homeObs','homeObs'));f.appendChild(s3);
  const s4=el('div','sec');s4.appendChild(el('div','sec-ttl','💬 Caregiver Conversation'));s4.appendChild(obsField('Caregiver Notes (Confidential)','caregiver','caregiver'));f.appendChild(s4);
  return f;
}

function tabEducation(){
  const s=el('div','sec');s.appendChild(el('div','sec-ttl','🎓 School / Daycare'));
  s.appendChild(r2(fld('School / Daycare Name',inp('text',cur.schoolName,'schoolName','School name')),fld('Grade Level',inp('text',cur.gradeLevel,'gradeLevel','3rd Grade'))));
  s.appendChild(fld('Academic Progress',sel(ACADEMIC,cur.academicProgress,'academicProgress')));
  const tr=el('div');tr.style.cssText='display:flex;gap:20px;margin-bottom:10px';
  tr.appendChild(tog('IEP in Place',cur.hasIEP,'hasIEP'));tr.appendChild(tog('504 Plan',cur.hasPlan504,'hasPlan504'));s.appendChild(tr);
  s.appendChild(fld('Services Currently Receiving',ta(cur.servicesReceiving,'servicesReceiving','Speech therapy, tutoring, counseling...')));
  s.appendChild(fld('Additional Needs & Recommendations',ta(cur.addlNeeds,'addlNeeds','Gaps identified, referrals needed...')));
  return s;
}

function tabVisitation(){
  const f=document.createDocumentFragment();
  const s1=el('div','sec');s1.appendChild(el('div','sec-ttl','👨‍👩‍👧 Parent Visitation'));
  s1.appendChild(r2(fld('Status',sel(VSTATUS,cur.parentStatus,'parentStatus')),fld('Quality',sel(QUAL,cur.parentQuality,'parentQuality'))));
  s1.appendChild(fld('Frequency',inp('text',cur.parentFreq,'parentFreq','Weekly, bi-weekly...')));
  s1.appendChild(fld('Concerns',ta(cur.parentConcerns,'parentConcerns','Any concerns about parent visitation...')));
  f.appendChild(s1);
  const s2=el('div','sec');s2.appendChild(el('div','sec-ttl','👫 Sibling Visitation'));
  s2.appendChild(fld('Status',sel(VSTATUS,cur.siblingStatus,'siblingStatus')));
  s2.appendChild(fld('Sibling Visitation Notes',ta(cur.siblingNotes,'siblingNotes','Frequency, quality, concerns...')));
  f.appendChild(s2);return f;
}

function tabGAL(){
  const s=el('div','sec');s.appendChild(el('div','sec-ttl','⚖️ GAL Action Items'));
  const wb=el('div','wishes-box '+(cur.wishesConfirmed?'':''));
  wb.style.background=cur.wishesConfirmed?'#F0FAF5':'#FFF8F0';
  wb.style.borderColor=cur.wishesConfirmed?'var(--teal)':'var(--accent)';
  const wh=el('div','wishes-ttl');
  wh.style.color=cur.wishesConfirmed?'var(--teal)':'var(--accent)';
  wh.innerHTML='💬 Child\'s Wishes & Wants ';
  const badge=el('span','badge',cur.wishesConfirmed?'✓ CONFIRMED':'REQUIRED');
  badge.style.background=cur.wishesConfirmed?'var(--teal)':'var(--accent)';
  wh.appendChild(badge);wb.appendChild(wh);
  const chkbox=el('div','wishes-chk');
  chkbox.style.background=cur.wishesConfirmed?'#D8F3E8':'#FEF0DC';
  chkbox.style.borderColor=cur.wishesConfirmed?'#A8DFC4':'#F0C88A';
  const chk=document.createElement('input');chk.type='checkbox';chk.checked=cur.wishesConfirmed;
  chk.style.accentColor='var(--teal)';
  chk.addEventListener('change',e=>{cur.wishesConfirmed=e.target.checked;render()});
  const ctxt=el('span','',cur.wishesConfirmed?'<span style="color:var(--teal)">I confirm the child was directly asked about their wishes and wants and given the opportunity to express their preferences, concerns, and desires.</span>':'<span style="color:var(--accent)">I confirm the child was directly asked about their wishes and wants and given the opportunity to express their preferences, concerns, and desires.</span>');
  chkbox.appendChild(chk);chkbox.appendChild(ctxt);wb.appendChild(chkbox);
  wb.appendChild(obsField("Child's Wishes and Wants",'wishes','wishes'));
  s.appendChild(wb);
  s.appendChild(fld('GAL Follow-Up Needed',ta(cur.galFollowUp,'galFollowUp','Action items, referrals, follow-up tasks...',3)));
  s.appendChild(fld('Additional Notes',ta(cur.additionalNotes,'additionalNotes','Any additional observations or notes...',3)));
  return s;
}

function tabNarrative(){
  const s=el('div','sec');s.appendChild(el('div','sec-ttl','📄 Visit Narrative'));
  const hint=el('p','','Generate a narrative from all visit data. Edit as needed, then copy into Word or Apple Pages.');
  hint.style.cssText='font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6;font-family:Trebuchet MS,sans-serif';
  s.appendChild(hint);
  const btnRow=el('div');btnRow.style.cssText='display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap';
  const genBtn=el('button','btn btn-navy','⚡ Generate');
  const copyBtn=el('button','btn btn-teal','📋 Copy');
  const saveBtn=el('button','btn btn-accent','💾 Save');
  const narrTa=document.createElement('textarea');narrTa.id='narr-ta';narrTa.placeholder='Tap Generate to create your report...';narrTa.value=cur.narrative||'';
  narrTa.addEventListener('input',e=>cur.narrative=e.target.value);
  genBtn.addEventListener('click',()=>{const t=buildNarrative(cur);narrTa.value=t;cur.narrative=t});
  copyBtn.addEventListener('click',async()=>{
    try{await navigator.clipboard.writeText(narrTa.value)}catch{narrTa.select();document.execCommand('copy')}
    copyBtn.textContent='✓ Copied!';copyBtn.className='btn btn-success';
    setTimeout(()=>{copyBtn.textContent='📋 Copy';copyBtn.className='btn btn-teal'},2500);
  });
  saveBtn.addEventListener('click',()=>{const ok=saveVisit();saveBtn.textContent=ok?'✓ Saved!':'⚠️ Failed';saveBtn.className='btn '+(ok?'btn-success':'btn-danger');setTimeout(()=>{saveBtn.textContent='💾 Save';saveBtn.className='btn btn-accent'},2000)});
  btnRow.appendChild(genBtn);btnRow.appendChild(copyBtn);btnRow.appendChild(saveBtn);
  s.appendChild(btnRow);s.appendChild(narrTa);return s;
}

// ── Render Form ───────────────────────────────────────────────────────────────
function renderForm(){
  // Tab bar
  const tb=document.getElementById('tab-bar');tb.innerHTML='';
  TABS.forEach(t=>{
    const btn=el('button','tab'+(t.id===tab?' on':''),t.label);
    btn.addEventListener('click',()=>{tab=t.id;renderForm()});
    tb.appendChild(btn);
  });
  // Content
  const main=document.getElementById('main');main.innerHTML='';
  const panels={core:tabCore,medical:tabMedical,obs:tabObs,education:tabEducation,visitation:tabVisitation,gal:tabGAL,narrative:tabNarrative};
  main.appendChild(panels[tab]());
  // Save bar
  if(tab!=='narrative'){
    const sb=el('div','save-bar');
    const msg=el('span','save-msg','');
    const btn=el('button','btn btn-teal','💾 Save Visit');
    btn.addEventListener('click',()=>{
      const ok=saveVisit();
      msg.textContent=ok?'✓ Saved!':'⚠️ Save failed';
      msg.style.color=ok?'var(--success)':'var(--danger)';
      btn.textContent=ok?'✓ Saved':'Save Visit';
      setTimeout(()=>{msg.textContent='';btn.textContent='💾 Save Visit'},2000);
    });
    sb.appendChild(msg);sb.appendChild(btn);main.appendChild(sb);
  }
}

// ── Main Render ───────────────────────────────────────────────────────────────
function render(){
  renderHeader();
  const vl=document.getElementById('view-list');
  const vf=document.getElementById('view-form');
  if(view==='list'){vl.style.display='block';vf.style.display='none';renderList();}
  else{vl.style.display='none';vf.style.display='block';renderForm();}
}

render();
</script>
